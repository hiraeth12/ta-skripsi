name: CI

on:
  push:
    branches:
      - development
      - staging
      - main
  pull_request:
    branches:
      - development
      - staging
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint